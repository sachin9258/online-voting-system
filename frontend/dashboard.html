<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Voter Dashboard | ECI</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#eef3f7;
  margin:0;
}

.header{
  background:#0b5ed7;
  color:#fff;
  padding:15px;
  text-align:center;
}

.container{
  max-width:500px;
  margin:30px auto;
  background:#fff;
  padding:25px;
  border-radius:12px;
  box-shadow:0 8px 25px rgba(0,0,0,.15);
}

.profile{
  text-align:center;
  margin-bottom:20px;
}

.profile img{
  width:130px;
  height:130px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #0b5ed7;
}

.info p{
  font-size:15px;
  margin:8px 0;
}

.info b{
  color:#0b5ed7;
}

.actions{
  margin-top:20px;
  text-align:center;
}

button{
  background:#0b5ed7;
  color:#fff;
  border:none;
  padding:10px 18px;
  margin:8px;
  border-radius:6px;
  cursor:pointer;
  font-size:15px;
}

button:hover{
  background:#094ab2;
}

.logout{
  background:#dc2626;
}
</style>
</head>

<body>

<div class="header">
  <h2>Voter Dashboard</h2>
</div>

<div class="container">

  <div class="profile">
    <img id="profilePhoto" src="" alt="Voter Photo">
  </div>

  <div class="info">
    <p><b>Name:</b> <span id="name"></span></p>
    <p><b>Aadhaar Number:</b> <span id="aadhaar"></span></p>
    <p><b>Voter ID:</b> <span id="voterId"></span></p>
  </div>

  <div class="actions">
    <button onclick="goToVote()">Proceed to Vote</button>
    <button class="logout" onclick="logout()">Logout</button>
  </div>

</div>

<script>
/* ================= LOAD VOTER DATA ================= */
const voter = JSON.parse(localStorage.getItem("voter"));

if(!voter){
  alert("Session expired. Please login again.");
  window.location.href = "login.html";
}

/* ================= BIND DATA ================= */
document.getElementById("name").innerText = voter.name;
document.getElementById("aadhaar").innerText = voter.aadhaarNumber;
document.getElementById("voterId").innerText = voter.voterId;

const img = document.getElementById("profilePhoto");
img.src = voter.photo;

/* ================= ACTIONS ================= */
function goToVote(){
  window.location.href = "services/voting.html";
}

function logout(){
  localStorage.removeItem("voter");
  window.location.href = "login.html";
}
</script>

</body>
</html>
