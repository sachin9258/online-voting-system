<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECI Official Portal</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f4f4; }
        .info-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; max-width: 500px; }
        h2 { color: #2c3e50; margin-bottom: 20px; }
        p { font-size: 1.1rem; line-height: 1.6; color: #555; }
        .official-btn { display: inline-block; margin-top: 25px; padding: 12px 25px; background-color: #27ae60; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        .official-btn:hover { background-color: #219150; transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="info-card">
        <h2>Election Commission of India</h2>
        <p>ज्यादा जानकारी या सुविधाओं का लाभ उठाने के लिए हमारे मुख्य पोर्टल पर जाएं।</p>
        <p>To access more services and benefits, please visit our main official portal.</p>
        
        <a href="https://voters.eci.gov.in/" target="_blank" class="official-btn">
            Go to Official Portal (voters.eci.gov.in)
        </a>
    </div>

</body>
</html>
